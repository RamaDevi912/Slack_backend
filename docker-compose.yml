version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: slack_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: slack_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - slack_network

  backend:
    build: .
    container_name: slack_backend
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/slack_db
      NODE_ENV: production
      PORT: 3001
      JWT_SECRET: your_super_secret_jwt_key
      FRONTEND_URL: http://localhost:3000
    ports:
      - "3001:3001"
      - "3002:3002"
    volumes:
      - ./uploads:/app/uploads
    networks:
      - slack_network
    command: >
      sh -c "npx prisma migrate deploy &&
             npm start"

volumes:
  postgres_data:

networks:
  slack_network:
    driver: bridge
